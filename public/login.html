<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Coach Diario</title>
</head>

<body style="font-family: Arial; display:flex; justify-content:center; align-items:center; min-height:100vh;">
  <div>
    <h1>Coach Diario</h1>
    <button id="loginBtn">Ingresar con Google</button>
    <p id="msg"></p>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBkNfrli8ni_ozXEUt17hl-GZVjuP7rV1U",
      authDomain: "coach-diario-v1.firebaseapp.com",
      projectId: "coach-diario-v1",
      appId: "1:3699793238:web:792c8acd39ad3c681a4af7"
    };

    firebase.initializeApp(firebaseConfig);

    const auth = firebase.auth();
    const provider = new firebase.auth.GoogleAuthProvider();
    const msg = document.getElementById("msg");

    document.getElementById("loginBtn").addEventListener("click", async () => {
      try {
        msg.innerText = "Abriendo Google...";
        await auth.signInWithPopup(provider);
        window.location.href = "/coach.html";
      } catch (error) {
        msg.innerText = error.message;
      }
    });
  </script>
</body>
</html>
