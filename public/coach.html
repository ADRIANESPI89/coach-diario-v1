<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coach Diario</title>

  <style>
    body {
      background: #0f1115;
      color: white;
      font-family: Arial, sans-serif;
      display: none;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .container {
      width: 90%;
      max-width: 500px;
    }

    textarea {
      width: 100%;
      height: 140px;
      padding: 15px;
      border-radius: 10px;
      border: none;
      background: #f6f8fa;
      resize: none;
      font-size: 22px;
      line-height: 1.6;
      color: #111827;
      box-sizing: border-box;
      outline: none;
    }

    button {
      margin-top: 15px;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .response {
      display: none;
      margin-top: 25px;
      background: #1a1d24;
      padding: 20px;
      border-radius: 12px;
      white-space: pre-line;
      line-height: 1.6;
    }

    .signature {
      margin-top: 28px;
      color: #5b8cff;
      font-size: 18px;
      font-weight: 500;
      opacity: 0.9;
    }
  </style>
</head>

<body>
  <div class="container">
    <textarea
      id="message"
      placeholder="Escribí cómo te sentís hoy..."
    ></textarea>

    <button id="sendButton" type="button">
      Enviar
    </button>

    <div id="response" class="response"></div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBkNfrli8ni_ozXEUt17hl-GZVjuP7rV1U",
      authDomain: "coach-diario-v1.firebaseapp.com",
      projectId: "coach-diario-v1",
      appId: "1:3699793238:web:792c8acd39ad3c681a4af7"
    };

    firebase.initializeApp(firebaseConfig);

    const auth = firebase.auth();

    const button = document.getElementById("sendButton");
    const responseDiv = document.getElementById("response");
    const messageInput = document.getElementById("message");

    function showDailyClosedMessage() {
      messageInput.style.display = "none";
      button.style.display = "none";

      responseDiv.innerHTML = `
Ya realizaste tu interacción de hoy.

Con que elijas una de las acciones propuestas y la lleves a algo concreto, ya estás generando movimiento.

<div class="signature">
Coach Diario
</div>
`;
      responseDiv.style.display = "block";
    }

    function showForm() {
      messageInput.style.display = "block";
      button.style.display = "block";
      responseDiv.style.display = "none";
    }

    auth.onAuthStateChanged(async (user) => {
      if (!user) {
        window.location.href = "/login.html";
        return;
      }

      document.body.style.display = "flex";

      try {
        const token = await user.getIdToken(true);

        const res = await fetch("/api/today", {
          method: "GET",
          headers: {
            "Authorization": `Bearer ${token}`
          }
        });

        const data = await res.json();

        if (data.status === "OK" && data.canInteract === false) {
          showDailyClosedMessage();
          return;
        }

        showForm();

      } catch (err) {
        console.error("TODAY CHECK ERROR:", err);
        showForm();
      }
    });

    async function sendMessage() {
      const text = messageInput.value.trim();

      if (!text) {
        responseDiv.innerText = "Escribí algo antes de enviar.";
        responseDiv.style.display = "block";
        return;
      }

      responseDiv.innerText = "Procesando...";
      responseDiv.style.display = "block";

      messageInput.style.display = "none";
      button.style.display = "none";
      button.disabled = true;

      try {
        const user = auth.currentUser;

        if (!user) {
          window.location.href = "/login.html";
          return;
        }

        const token = await user.getIdToken(true);

        const res = await fetch("/api/interaction", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
          },
          body: JSON.stringify({
            message: text
          })
        });

        const data = await res.json();
        console.log(data);

        if (data.response && data.response.text) {
          responseDiv.innerHTML = `
${data.response.text}

<div class="signature">
Coach Diario
</div>
`;
        } else if (data.message) {
          responseDiv.innerHTML = `
${data.message}

<div class="signature">
Coach Diario
</div>
`;
        } else {
          responseDiv.innerText = "No se pudo generar respuesta.";
        }

      } catch (err) {
        console.error(err);
        responseDiv.innerText = "Error conectando con el servidor.";
      } finally {
        button.disabled = false;
      }
    }

    button.addEventListener("click", sendMessage);
  </script>
</body>
</html>
